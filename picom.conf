# Picom Configuration - Optimized for MAXIMUM Performance
# ======================================================

# Backend Configuration - Use xrender for best performance
backend = "xrender";
vsync = false;

# Opacity Settings (lightweight)
#opacity-rule = [ 
	#"100:_NET_WM_STATE = '_NET_WM_STATE_FULLSCREEN'",
	#"100:_NET_WM_STATE = '_NET_WM_STATE_MAXIMIZED_VERT'",
	#"100:_NET_WM_STATE = '_NET_WM_STATE_MAXIMIZED_HORZ'",
	#"90 :window_type *= 'dock'",
	#"100 :window_type *= 'desktop'",
	#"100 :class_g *= 'Eog'",
	#"100 :class_g *= 'Evince'",
	#"100:class_g *= 'firefox'",
	#"100:class_g *= 'Google-chrome'",
	#"70:class_g *= 'ksplash'",
	#"100:class_g *= 'libreoffice'",
	#"90 :class_g *= 'Mendeley Desktop'",
	#"100:class_g *= 'mpv'",
	#"100:class_g *= 'plasmashell'",
	#"100:class_g *= 'Teams'",
	#"80 :class_g *= 'Spotify'",
	#"90 :class_g *= 'Surf'",
	#"100:class_g *= 'Teams'",
	#"100 :class_g *= 'URxvt'",
	#"80 :class_g *= 'discord'",
	#"100 :class_g *= 'Deskimg'",
	#"100 :class_g *= 'factrio'",
	#"90 :class_g *= 'Zathura'",
	#"100 :class_g *= 'zoom'"
#];

# Opacity Values (minimal transparency for performance)
#popup_menu-opacity = 0.95;
#inactive-opacity = 0.95;
active-opacity = 1;
#frame-opacity = 1.0;
#dock-opacity = 0.95;
#inactive-opacity-override = false;

#pseudo-transparency = true;

# Backend Configuration
#backend = "xrender";  # Better performance than glx for most setups

# Blur ------------------------------------------------------------------------
blur: {
	method = "none";  # High quality, good performance
	strength = 10;            # Lower value = better performance
	size=50;
	deviation=50;
	#background = true;       # Blur backgrounds
	#background-frame = true; # Blur window backgrounds
	
}
blur-background-fixed=true;

blur-background-exclude = [
	"class_g *= 'Peek'",
	"class_g *= 'Deskimg'",
	"class_g *= 'zoom'",
	"class_g *= 'kdeconnect.daemon'",
	"name *= 'rect-overlay'"
]

# Round coners ----------------------------------------------------------------
corner-radius = 12;

rounded-corners-exclude = [
  "name   *= 'tray'",
  "window_type = 'dock'",
  "window_type = 'desktop'",
	"class_g *= 'Deskimg'",
  "class_g *= 'mpv'"
];

# Shadows
shadow = false;
shadow-radius = 12;
shadow-offset-x = -5;
shadow-offset-y = -5;
shadow-color = "#000000";
shadow-opacity = 0.3;

# Window-specific animations

# Performance optimizations
use-damage = true;
unredir-if-possible = true;
focus-exclude = [
	"class_g *= 'Cairo-clock'",
	"class_g *= 'Conky'",
	"class_g *= 'Peek'",
	"class_g *= 'mpv'",
	"class_g *= 'vlc'"
];

# Mark windows as overlay to improve performance
mark-overdir-focused = true;
mark-ovredir-focused = true;

# Additional performance flags
no-fading-openclose = true;
no-fading-destroyed-argb = true;
no-fading-override = true;
