# https://wiki.hypr.land/Configuring/

# You can split this configuration into multiple files
# source = ~/.config/hypr/myColors.conf
# Host-specific overrides are loaded through a stable shim:
#   ~/.config/hypr/hyprland-local-current.conf
# The shim should source one tracked profile (desktop/laptop/host).
source = ~/.config/hypr/hyprland-local-current.conf


################
### MONITORS ###
################

# See https://wiki.hypr.land/Configuring/Monitors/
# Host-specific monitor layout moved to hyprland-local-<host>.conf
#layerrule = noanim, hyprpicker
#layerrule = noanim, selection

###################
### MY PROGRAMS ###
###################

$terminal = kitty
$fileManager = dolphin
$menu = wofi --show drun
$browser = vivaldi

#################
### AUTOSTART ###
#################

exec-once = ironbar & blueman-applet
#exec-once = copyq &
#exec-once = openrgb --startminimized &
exec-once = /usr/lib/polkit-kde-authentication-agent-1
exec-once = pactl load-module module-switch-on-connect
exec-once = hyprsunset
#exec-once = audiorelay --minimized
# Desktop/VR host-specific autostarts moved to local profile.

#############################
### ENVIRONMENT VARIABLES ###
#############################

# Qt6 style/colors/icons via qt6ct (non-Plasma session)
env = QT_QPA_PLATFORMTHEME,qt6ct

env = XCURSOR_SIZE,24
env = HYPRCURSOR_SIZE,24
env = LIBVA_DRIVER_NAME,nvidia
env = __GLX_VENDOR_LIBRARY_NAME,nvidia
env = NVD_BACKEND,direct

################
### RENDER   ###
################

render {
	cm_enabled = true
}

# Session lock normally hides all desktop content (Wayland security model). Without this,
# transparent areas in hyprlock blend against black — not your wallpaper. Enabling xray
# composites the live session behind the lock layer (weaker visual privacy if you use transparency).
misc {
    session_lock_xray = true
}

#####################
### LOOK AND FEEL ###
#####################

general {
    gaps_in = 5
    gaps_out = 0,5,5,5

    border_size = 2

    col.active_border = rgb(89B4FA) rgb(f5c2e7) 45deg
    col.inactive_border = rgba(595959aa)

    resize_on_border = true
    allow_tearing = false

    layout = dwindle
}

layerrule = blur on, match:namespace ^ironbar$
#layerrule = ignore_alpha 0.5, match:namespace ^ironbar$

# https://wiki.hypr.land/Configuring/Variables/#decoration
decoration {
    rounding = 10
    rounding_power = 2

    # Change transparency of focused and unfocused windows
    active_opacity = 1.0
    inactive_opacity = 1.0


    shadow {
        enabled = true
        range = 4
        render_power = 3
        color = rgba(1a1a1aee)
    }

    # https://wiki.hypr.land/Configuring/Variables/#blur
    blur {
        enabled = true 
        size = 10
        passes = 4

        vibrancy = 0
    }
}

animations {
    #enabled = yes, please :)

    bezier = easeOutQuint,0.23,1,0.32,1
    bezier = easeInOutCubic,0.65,0.05,0.36,1
    bezier = linear,0,0,1,1
    bezier = almostLinear,0.5,0.5,0.75,1.0
    bezier = quick,0.15,0,0.1,1

    animation = global, 1, 10, default
    animation = border, 1, 5.39, easeOutQuint
	animation = windows, 1, 4.79, easeOutQuint
	animation = windowsIn, 0, 4.1, easeOutQuint, popin 87%
	animation = windowsOut, 1, 1.49, linear, popin 87%
    animation = fadeIn, 1, 1.73, almostLinear
    animation = fadeOut, 1, 1.46, almostLinear
    animation = fade, 1, 3.03, quick
    animation = layers, 1, 3.81, easeOutQuint
	animation = layersIn, 1, 1.5, quick, fade
    animation = layersOut, 1, 1.5, linear, fade
    animation = fadeLayersIn, 1, 1.79, almostLinear
    animation = fadeLayersOut, 1, 1.39, almostLinear
    animation = workspaces, 1, 1.94, almostLinear, fade
    animation = workspacesIn, 1, 1.21, almostLinear, fade
    animation = workspacesOut, 1, 1.94, almostLinear, fade
}

dwindle {
    pseudotile = true
    preserve_split = true 
	use_active_for_splits = true
	force_split = 2
	smart_resizing = false
}

master {
    new_status = master
}

#############
### INPUT ###
#############

# https://wiki.hypr.land/Configuring/Variables/#input
input {
    follow_mouse = 0
	mouse_refocus = 0
	float_switch_override_focus = 0

    sensitivity = 0 # -1.0 - 1.0, 0 means no modification.

    touchpad {
        natural_scroll = false
    }

    # US + Canadian French as one XKB group list. Lock script forces US before hyprlock, then
    # restores this group’s active index after unlock. Super+comma toggles via script; Alt+Shift cycles.
    kb_layout = us,ca
    kb_variant = ,fr
    kb_options = grp:alt_shift_toggle
}

cursor {
	no_hardware_cursors = 0
}

###################
### KEYBINDINGS ###
###################

# See https://wiki.hypr.land/Configuring/Keywords/
$mainMod = SUPER # Sets "Windows" key as main modifier

bind = $mainMod, Return, exec, $terminal
bind = $mainMod SHIFT, Return, exec, [float; size 1800 1000; center] $terminal
bind = $mainMod, g, exec, $browser
bind = $mainMod SHIFT, g, exec, [float; center] $browser
bind = CTRL Shift, c, exec, copyq show
bind = $mainMod, R, exec, kitty -e ranger
bind = $mainMod SHIFT, R, exec, [float; center] kitty -e ranger
bind = $mainMod, Z, exec, zathura
bind = $mainMod SHIFT, Z, exec, [float; center] zathura

bind = $mainMod, W, killactive,
bind = $mainMod Shift, W, exec, hyprctl dispatch forcekillactive
bind = $mainMod SHIFT CTRL, Q, exec, hyprctl dispatch exit
bind = $mainMod, E, exec, $fileManager
bind = $mainMod SHIFT, E, exec, [float; center] $fileManager
bind = $mainMod, F, togglefloating,
bind = $mainMod, C, centerwindow, 1
bind = $mainMod CTRL, F, exec, ~/.config/scripts/float_next
bind = $mainMod, Space, exec, $menu
bind = $mainMod, P, pseudo, # dwindle
bind = $mainMod, T, togglesplit, # dwindle
bind = $mainMod, M, fullscreen, 1
bind = $mainMod Shift, F, fullscreen, 0
bind = $mainMod, Q, exec, hyprctl dispatch pin

bind = , Print, exec, hyprshot -m region
bind = Shift, Print, exec, hyprshot -m output -z 

# Screen lock ($mainMod+l is movefocus right; use Shift+L)
# Empty workspace first so hyprlock's screenshot background shows wallpaper, not stacked windows.
bind = $mainMod SHIFT, L, exec, ~/.config/scripts/hyprlock_empty_then_restore.sh

# Move focus with mainMod + vim
bind = $mainMod, h, movefocus, l
bind = $mainMod, l, movefocus, r
bind = $mainMod, k, movefocus, u
bind = $mainMod, j, movefocus, d

# Cycle through windows on current workspace (Alt+Tab style)
bind = ALT, Tab, cyclenext,
bind = ALT SHIFT, Tab, cyclenext, prev

# swap window with window in specified direction
bind = $mainMod Shift, h, swapwindow, l
bind = $mainMod Shift, l, swapwindow, r
bind = $mainMod Shift, k, swapwindow, u
bind = $mainMod Shift, j, swapwindow, d

# preselect
bind = $mainMod CTRL,  h, exec, /home/amda/.config/scripts/preselect_overlay l
bind = $mainMod CTRL,  l, exec, /home/amda/.config/scripts/preselect_overlay r
bind = $mainMod CTRL,  k, exec, /home/amda/.config/scripts/preselect_overlay u
bind = $mainMod CTRL,  j, exec, /home/amda/.config/scripts/preselect_overlay d
bind = $mainMod, O, exec, /home/amda/.config/scripts/move_to_preselect

# Switch workspaces with mainMod + [0-9]
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10

# Move active window to a workspace with mainMod + SHIFT + [0-9]
bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8
bind = $mainMod SHIFT, 9, movetoworkspace, 9
bind = $mainMod SHIFT, 0, movetoworkspace, 10

# Example special workspace (scratchpad)
bind = $mainMod, S, togglespecialworkspace, magic
bind = $mainMod SHIFT, S, movetoworkspace, special:magic

# Scroll through existing workspaces with mainMod + scroll
bind = $mainMod, mouse_down, workspace, e+1
bind = $mainMod, mouse_up, workspace, e-1

# Move/resize windows with mainMod + LMB/RMB and dragging
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

# Laptop multimedia keys for volume and LCD brightness
bindel = ,XF86AudioRaiseVolume, exec, wpctl set-volume -l 1 @DEFAULT_AUDIO_SINK@ 5%+
bindel = ,XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bindel = ,XF86AudioMute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bindel = ,XF86AudioMicMute, exec, wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle
bindel = ,XF86MonBrightnessUp, exec, brightnessctl -e4 -n2 set 5%+
bindel = ,XF86MonBrightnessDown, exec, brightnessctl -e4 -n2 set 5%-

# Requires playerctl
bindl = , XF86AudioNext, exec, playerctl next
bindl = , XF86AudioPause, exec, playerctl play-pause
bindl = , XF86AudioPlay, exec, playerctl play-pause
bindl = , XF86AudioPrev, exec, playerctl previous

# Keyboard layout
bind = $mainMod, comma, exec, ~/.config/scripts/toggle_kb_layout.sh

# AudioRelay (toggle its hidden workspace)
bind = $mainMod, A, togglespecialworkspace, audiorelay

#WiVRn!!
bind = $mainMod, grave, exec, ~/.config/scripts/wivern_connect.sh

##############################
### WINDOWS AND WORKSPACES ###
##############################

# See https://wiki.hypr.land/Configuring/Window-Rules/ for more
# See https://wiki.hypr.land/Configuring/Workspace-Rules/ for workspace rules
windowrule = match:class copy., float on
windowrule = match:class com.github.hluk.copyq, float on
#windowrulev2 = workspace special:audiorelay silent, class:^(com-azefsw-audioconnect-desktop-app-MainKt)$
windowrule = match:class discord, float on
#windowrulev2 = opacity 0.9 0.9, class:^(Cursor|cursor)$

windowrule = border_size 0, match:fullscreen_state_internal 1
windowrule = border_color rgb(89B4FA) rgb(89B4FA), match:pin true
windowrule = border_size 3, match:pin true

# Ignore maximize requests from apps. You'll probably like this.
windowrule = match:class .*, suppress_event maximize


# Fix some dragging issues with XWayland
windowrule = match:class ^$, match:title ^$, match:xwayland true, match:float true, match:fullscreen false, match:pin false, no_focus on


