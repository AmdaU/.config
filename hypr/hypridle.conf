# https://wiki.hypr.land/Hypr-Ecosystem/hypridle/
# Idle inhibitors (video, many games) delay the lock listener by default.

general {
    lock_cmd = pidof hyprlock || /home/amda/.config/scripts/hyprlock_empty_then_restore.sh
    before_sleep_cmd = loginctl lock-session
    after_sleep_cmd = hyprctl dispatch dpms on
}

listener {
    timeout = 900
    on-timeout = loginctl lock-session
}
