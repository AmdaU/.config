# https://wiki.hypr.land/Hypr-Ecosystem/hyprlock/
# Text supports pango markup. ESC / Ctrl+U / Ctrl+Backspace clear the password buffer.

$font = Monospace

general {
    hide_cursor = false
}

animations {
    enabled = true
    bezier = linear, 1, 1, 0, 0
    animation = fadeIn, 1, 5, linear
    animation = fadeOut, 1, 5, linear
    animation = inputFieldFade, 1, 5, linear
    animation = inputFieldDots, 1, 2, linear
}

background {
    monitor =
	blur_passes = 2
	color = rgba(0, 0, 0, 0.1)
}

input-field {
    monitor =
    size = 20%, 5%
    outline_thickness = 3
    inner_color = rgba(17, 17, 17, 0.5)

    # Match Hyprland active border (89B4FA / f5c2e7)
    outer_color = rgba(89b4faee) rgba(f5c2e7ee) 45deg
    check_color = rgba(89b4faee) rgba(a6e3a1ee) 120deg
    fail_color = rgba(f38ba8ee) rgba(eb6f92ee) 40deg

    font_color = rgb(143, 143, 143)
    fade_on_empty = true
    fade_timeout = 3000
    rounding = 15

    font_family = $font
    placeholder_text = Password…
    fail_text = $PAMFAIL

    dots_spacing = 0.3

    position = 0, -20
    halign = center
    valign = center
}

label {
    monitor =
    text = $TIME
    font_size = 90
    font_family = Fira code

	color = rgba(150,150,150,0.5)

    position = 0, 200
    halign = center
    valign = bottom
}

